<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link To JSon </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E50914; 
            --primary-hover: #F40612;
            --secondary: #10b981;
            --bg-body: #08080A;
            --bg-card: rgba(20, 20, 25, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-muted: #A0A0B0;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Outfit', sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
            background: radial-gradient(circle at top right, #1a0a0f, #08080a 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container { 
            width: 100%;
            max-width: 900px; 
            background: var(--bg-card); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 45px; 
            border-radius: 28px; 
            border: 1px solid var(--border-color);
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.9);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 40px; }
        h2 { 
            margin: 0 0 10px 0; 
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1.5px;
        }
        .subtitle { color: var(--text-muted); font-size: 1.1rem; }

        /* Upload Area */
        .upload-zone {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s;
            cursor: pointer;
            margin-bottom: 25px;
        }
        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(229, 9, 20, 0.05);
        }
        .upload-zone.dragover {
            border-color: var(--secondary);
            background: rgba(16, 185, 129, 0.1);
        }
        .upload-zone p { margin: 10px 0 0 0; color: var(--text-muted); }
        .upload-zone strong { color: #fff; display: block; font-size: 1.1rem; }

        /* Input Area */
        textarea { 
            width: 100%; 
            height: 180px; 
            padding: 20px; 
            background: #050507; 
            color: #d1d1d1; 
            border: 1px solid var(--border-color); 
            border-radius: 16px; 
            font-family: 'Fira Code', monospace;
            font-size: 0.95em;
            resize: vertical;
            margin-bottom: 25px;
            transition: border-color 0.3s;
        }
        textarea:focus { outline: none; border-color: var(--primary); }

        /* Buttons */
        .btn-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 40px;
        }

        button { 
            padding: 18px; 
            border: none; 
            border-radius: 14px; 
            font-weight: 700;
            cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: all 0.2s;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-copy { background: #333; color: white; display: none; }
        .btn-download { background: var(--secondary); color: white; display: none; }

        button:hover { transform: translateY(-2px); filter: brightness(1.2); }
        button:active { transform: translateY(0); }

        /* Output Area */
        .output-container { position: relative; }
        .output-label {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; color: var(--text-muted); font-weight: 600;
        }

        pre { 
            background: #050507; 
            padding: 30px; 
            border-radius: 20px; 
            overflow-x: auto; 
            color: #d1d1d1;
            border: 1px solid var(--border-color); 
            font-family: 'Fira Code', monospace;
            font-size: 0.95em;
            line-height: 1.6;
            min-height: 100px;
        }

        /* Syntax colors */
        .key { color: #e06c75; }
        .string { color: #98c379; }
        .punctuation { color: #abb2bf; }

        /* Toast */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--secondary); color: white; padding: 15px 30px;
            border-radius: 50px; font-weight: 600; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; opacity: 0;
        }
        .toast.active { transform: translateX(-50%) translateY(0); opacity: 1; }

        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>LINK TO JSON</h2>
        <div class="subtitle">Created By Fergians</div>
    </div>

    <!-- File Upload Section -->
    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="color: var(--primary); margin-bottom: 10px;">
            <path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v8"></path>
        </svg>
        <strong>Klik atau Tarik File .txt Ke Sini</strong>
        <p id="fileName">Format: Judul | Link atau Link saja per baris</p>
        <input type="file" id="fileInput" accept=".txt">
    </div>

    <textarea id="linksInput" placeholder="Atau paste link di sini secara manual..."></textarea>

    <div class="btn-grid">
        <button class="btn-primary" onclick="processJSON()">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
            Generate Raw Log
        </button>
        <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
            Salin Log
        </button>
        <button class="btn-download" id="downBtn" onclick="downloadFile()">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            Download
        </button>
    </div>

    <div class="output-container">
        <div class="output-label">
            <span>PREVIEW RAW LOG (Siap Paste)</span>
            <span id="countDisplay" style="color: var(--primary);">0 Objek</span>
        </div>
        <pre id="output">Hasil akan muncul di sini...</pre>
    </div>
</div>

<div class="toast" id="toast">Berhasil disalin!</div>

<script>
    let currentRawString = "";
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const linksInput = document.getElementById('linksInput');

    // Handle File Upload via Click
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) handleFile(file);
    });

    // Handle Drag & Drop
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.name.endsWith('.txt')) {
            handleFile(file);
        } else {
            showToast("Gunakan file .txt saja!");
        }
    });

    function handleFile(file) {
        document.getElementById('fileName').innerText = "📄 File: " + file.name;
        const reader = new FileReader();
        reader.onload = (e) => {
            linksInput.value = e.target.result;
            processJSON(); // Langsung proses setelah load
        };
        reader.readAsText(file);
    }

    function generateId() {
        return Math.random().toString(36).substring(2, 10).toUpperCase();
    }

    function extractId(url) {
        try {
            const filename = url.split('/').pop();
            const id = filename.replace(/\.[^/.]+$/, "");
            return id || generateId();
        } catch(e) { return generateId(); }
    }

    function getPrefix() {
        const p = ["Hot", "Viral", "Bocor", "Skandal", "Full", "Goyang", "Aksi", "Terciduk", "Video", "Koleksi"];
        return p[Math.floor(Math.random() * p.length)];
    }

    function getSuffix() {
        const s = ["Mantap", "No Sensor", "Di Hutan", "Bikin Lemes", "Terbaru", "Jos", "Gacor", "Parah", "Malam Jumat"];
        return s[Math.floor(Math.random() * s.length)];
    }

    function highlight(text) {
        return text
            .replace(/"(.*?)"(?=:)/g, '<span class="key">"$1"</span>') 
            .replace(/:\s*"(.*?)"/g, ': <span class="string">"$1"</span>') 
            .replace(/[{}[\]]/g, '<span class="punctuation">$&</span>'); 
    }

    function processJSON() {
        const input = linksInput.value.trim();
        if (!input) {
            showToast("Input kosong!");
            return;
        }

        const lines = input.split('\n').filter(line => line.trim() !== "");
        let outputStr = "";

        lines.forEach((line, index) => {
            let title = "";
            let url = "";

            if (line.includes('|')) {
                const parts = line.split('|');
                title = parts[0].trim();
                url = parts[1].trim();
            } else {
                title = `${getPrefix()} ${getSuffix()}`;
                url = line.trim();
            }

            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            const obj = {
                id: extractId(url),
                title: title,
                video_url: url
            };

            outputStr += `  {
            "id": "${obj.id}",
            "title": "${obj.title.replace(/"/g, '\\"')}",
            "video_url": "${obj.video_url}"
          }`;

            if (index < lines.length - 1) {
                outputStr += ",";
            }

            outputStr += "\n";
        });
        currentRawString = outputStr;
        document.getElementById('output').innerHTML = highlight(outputStr);
        document.getElementById('countDisplay').innerText = `${objects.length} Objek`;
        
        document.getElementById('copyBtn').style.display = 'flex';
        document.getElementById('downBtn').style.display = 'flex';
        
        showToast(`Berhasil memproses ${objects.length} video.`);
    }

    function copyToClipboard() {
        if (!currentRawString) return;
        const el = document.createElement('textarea');
        el.value = currentRawString;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        showToast("Log disalin! Siap dipaste ke JSON.");
    }

    function downloadFile() {
        if (!currentRawString) return;
        const blob = new Blob([currentRawString], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "raw_objects.txt";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 3000);
    }
</script>

</body>
</html>
